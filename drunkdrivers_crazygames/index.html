<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Drunk Drivers.io — Party Arena</title>
  <meta name="description" content="Drunk Drivers.io — A chaotic multiplayer driving game where risk meets reward. Drink, drift, and dominate!" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- NippleJS for Joystick -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Orbitron', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            neon: {
              cyan: '#00f0ff',
              magenta: '#ff00e5',
              green: '#00ff88',
              red: '#ff0044',
              yellow: '#ffd700',
              purple: '#8b5cf6',
            }
          }
        }
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Inter', sans-serif;
      background: #050508;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; position: absolute; top: 0; left: 0; z-index: 0; }
    
    /* Hide scrollbars visually */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Neon glow keyframes ── */
    @keyframes neonPulse {
      0%, 100% { text-shadow: 0 0 10px #00f0ff, 0 0 30px #00f0ff, 0 0 60px #00f0ff; }
      50% { text-shadow: 0 0 5px #00f0ff, 0 0 15px #00f0ff, 0 0 30px #00f0ff; }
    }
    @keyframes borderGlow {
      0%, 100% { border-color: rgba(0, 240, 255, 0.4); box-shadow: 0 0 15px rgba(0, 240, 255, 0.15), inset 0 0 15px rgba(0, 240, 255, 0.05); }
      50% { border-color: rgba(0, 240, 255, 0.7); box-shadow: 0 0 25px rgba(0, 240, 255, 0.25), inset 0 0 25px rgba(0, 240, 255, 0.1); }
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes promilleBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255, 0, 229, 0.4); }
      50% { box-shadow: 0 0 16px rgba(255, 0, 229, 0.8); }
    }
    @keyframes deathFlash {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.3), inset 0 0 20px rgba(0, 240, 255, 0.05); }
      50% { box-shadow: 0 0 40px rgba(0, 240, 255, 0.5), inset 0 0 30px rgba(0, 240, 255, 0.1); }
    }
    @keyframes boostReady {
      0%, 100% { box-shadow: 0 0 8px rgba(0, 240, 255, 0.4); }
      50% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.8); }
    }
    @keyframes floatDecor {
      0% { transform: translateY(0) rotate(-15deg); }
      50% { transform: translateY(-20px) rotate(-10deg); }
      100% { transform: translateY(0) rotate(-15deg); }
    }
    @keyframes floatDecor2 {
      0% { transform: translateY(0) rotate(15deg); }
      50% { transform: translateY(20px) rotate(10deg); }
      100% { transform: translateY(0) rotate(15deg); }
    }

    .glass {
      background: rgba(8, 10, 20, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 240, 255, 0.25);
      animation: borderGlow 3s ease-in-out infinite;
    }
    .glass-subtle {
      background: rgba(8, 10, 20, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.12);
    }
    .neon-text { animation: neonPulse 2s ease-in-out infinite; }
    .promille-blink { animation: promilleBlink 0.4s ease-in-out infinite; }

    /* Color swatches */
    .color-swatch {
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all 0.2s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #fff; box-shadow: 0 0 12px currentColor; transform: scale(1.15); }

    /* Mobile touch controls */
    .touch-btn {
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: rgba(255,255,255,0.5);
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .touch-btn:active, .touch-btn.pressed {
      background: rgba(0, 240, 255, 0.2);
      border-color: rgba(0, 240, 255, 0.5);
      color: #00f0ff;
    }
    .touch-boost {
      width: 70px; height: 70px; font-size: 14px; font-family: 'Orbitron', sans-serif;
      font-weight: 700; letter-spacing: 1px;
    }

    /* Car preview canvas */
    #carPreview, #unlockCarPreview { display: block; margin: 0 auto; position: relative !important; z-index: 10; }
  </style>
</head>
<body class="bg-black text-white font-body overflow-hidden w-full h-screen flex flex-col">

  <!-- Background Layer -->
  <div class="fixed inset-0 z-0 bg-[#050508]" style="background-image: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.03), transparent 70%);"></div>

  <!-- Main Layout Wrapper -->
  <div class="relative z-10 flex-1 flex flex-row w-full h-full overflow-hidden">
    
    <!-- Center Column -->
    <div class="flex-1 flex flex-col overflow-hidden p-0">
      


      <!-- Game Wrapper -->
      <div class="flex-1 flex flex-col p-0 sm:p-4 lg:p-6 overflow-hidden min-h-0">
        <!-- Game Container -->
        <div id="gameContainer" class="relative w-full h-full max-w-[2100px] mx-auto bg-[#060610] sm:rounded-2xl overflow-hidden sm:shadow-[0_0_50px_rgba(0,240,255,0.05)] sm:border border-white/10 flex-1 min-h-0">
        
        <!-- ═══════════ GAME CANVAS ═══════════ -->
        <canvas id="gameCanvas" class="absolute inset-0 w-full h-full"></canvas>

        <!-- ═══════════ MAIN MENU OVERLAY ═══════════ -->
        <div id="menuOverlay" class="absolute inset-0 z-50 flex items-center justify-center overflow-hidden" style="background: radial-gradient(ellipse at center, rgba(0,15,30,0.85) 0%, rgba(5,5,8,0.98) 70%);">

    <!-- Left Background Deco (Cannabis) -->
    <div class="absolute left-0 top-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-0">
      <div style="animation: floatDecor 6s ease-in-out infinite;">
        <svg viewBox="0 0 24 24" class="w-48 h-48 sm:w-64 sm:h-64 md:w-80 md:h-80 lg:w-96 lg:h-96 text-neon-green rotate-[20deg] opacity-40 drop-shadow-[0_0_30px_rgba(0,255,136,0.6)]" fill="currentColor">
          <path d="M11.5,22V17.35C11,18.13 10,19.09 8.03,19.81C8.03,19.81 8.53,18.1 9.94,16.95C8.64,17.23 6.68,17.19 4,16C4,16 6.47,14.59 9.28,14.97C7.69,14 5.7,12.08 4.17,8.11C4.17,8.11 8.67,9.34 10.91,13.14C8.88,8.24 12,2 12,2C14.43,7.47 13.91,11.1 13.12,13.1C15.37,9.33 19.83,8.11 19.83,8.11C18.3,12.08 16.31,14 14.72,14.97C17.53,14.59 20,16 20,16C17.32,17.19 15.36,17.23 14.06,16.95C15.47,18.1 15.97,19.81 15.97,19.81C14,19.09 13,18.13 12.5,17.35V22H11.5Z" />
        </svg>
      </div>
    </div>

    <!-- Right Background Deco (Cocktail) -->
    <div class="absolute right-0 top-1/2 translate-x-1/2 -translate-y-1/2 pointer-events-none z-0">
      <div style="animation: floatDecor2 7s ease-in-out infinite;">
        <svg viewBox="0 0 24 24" class="w-48 h-48 sm:w-64 sm:h-64 md:w-80 md:h-80 lg:w-96 lg:h-96 text-neon-magenta -rotate-[20deg] opacity-40 drop-shadow-[0_0_30px_rgba(255,0,229,0.6)]" fill="currentColor">
          <path d="M7.5,7L5.5,5H18.5L16.5,7M11,13V19H6V21H18V19H13V13L21,5V3H3V5L11,13Z" />
        </svg>
      </div>
    </div>

    <div id="menuCard" class="glass rounded-2xl p-6 sm:p-8 w-full max-w-md mx-4 my-auto max-h-[calc(100%-2rem)] overflow-y-auto no-scrollbar" style="animation: floatIn 0.6s ease-out;">

      <!-- Title -->
      <div class="text-center mb-6 relative">
        <h1 class="font-display text-3xl sm:text-5xl font-black tracking-wider text-neon-cyan neon-text mb-2">
          DRUNK<br/>DRIVERS<span class="text-neon-magenta">.io</span>
        </h1>
        <p class="font-body text-xs sm:text-sm text-gray-400 tracking-widest uppercase mt-2">Party Arena</p>
        
        <!-- Main Menu Highscore -->
        <div class="absolute -top-4 -right-2 sm:-right-4 bg-white/5 border border-neon-cyan/30 rounded-lg px-3 py-1 shadow-[0_0_10px_rgba(0,240,255,0.2)]">
          <div class="font-display text-[8px] text-gray-400 uppercase tracking-widest leading-tight">Highscore</div>
          <div id="menuHighscore" class="font-display text-sm font-bold text-neon-cyan leading-none">0</div>
        </div>
      </div>

      <!-- Nickname Input -->
      <div class="mb-4">
        <label for="nicknameInput" class="block font-display text-[10px] text-gray-400 tracking-widest uppercase mb-1.5">Callsign</label>
        <input
          id="nicknameInput"
          type="text"
          maxlength="16"
          placeholder="Enter your name..."
          autocomplete="off"
          class="w-full bg-black/50 border border-neon-cyan/20 rounded-xl px-4 py-3 text-white font-body text-base
                 placeholder-gray-600 outline-none transition-all duration-300
                 focus:border-neon-cyan/60 focus:shadow-[0_0_20px_rgba(0,240,255,0.15)]"
        />
      </div>


      <!-- Room Code -->
      <div class="mb-4">
        <label for="roomCodeInput" class="block font-display text-[10px] text-gray-400 tracking-widest uppercase mb-1.5">Room Code (Optional)</label>
        <input id="roomCodeInput" type="text" maxlength="4" placeholder="e.g. ABCD" autocomplete="off" class="w-full bg-black/50 border border-neon-cyan/20 rounded-xl px-4 py-3 text-white font-body text-base placeholder-gray-600 outline-none transition-all duration-300 focus:border-neon-cyan/60 focus:shadow-[0_0_20px_rgba(0,240,255,0.15)] uppercase text-center tracking-widest font-bold">
      </div>
      <!-- Customize Button -->
      <button
        id="customizeBtn"
        class="w-full py-2.5 rounded-xl font-display text-xs font-bold tracking-widest uppercase mb-4
               bg-white/5 border border-white/10 text-gray-300
               transition-all duration-300 cursor-pointer
               hover:bg-white/10 hover:border-neon-magenta/40 hover:text-neon-magenta
               active:scale-[0.98]"
      >
        Customize Car
      </button>

      <!-- Play Button Section -->
      <div class="flex items-center justify-between gap-3 w-full">
        <!-- Neon Bottle Left -->
        <div class="flex-shrink-0" style="animation: floatDecor 4s ease-in-out infinite;">
          <svg viewBox="0 0 24 24" class="w-8 h-8 sm:w-10 sm:h-10 opacity-90 drop-shadow-[0_0_15px_rgba(0,255,136,1)] text-neon-green">
            <path fill="currentColor" d="M12,2A1,1 0 0,0 11,3V6C10,6.5 9,7.5 9,9V19A2,2 0 0,0 11,21H13A2,2 0 0,0 15,19V9C15,7.5 14,6.5 13,6V3A1,1 0 0,0 12,2M12,4A1,1 0 0,1 13,5H11A1,1 0 0,1 12,4M11,7H13C13.5,7 14,7.5 14,8V19H10V8C10,7.5 10.5,7 11,7Z" />
          </svg>
        </div>

        <!-- Play Button -->
        <button
          id="playBtn"
          class="flex-1 py-4 rounded-xl font-display text-lg font-bold tracking-widest uppercase
                 bg-gradient-to-r from-neon-cyan/20 to-neon-magenta/20
                 border border-neon-cyan/40 text-neon-cyan
                 transition-all duration-300 cursor-pointer
                 hover:from-neon-cyan/30 hover:to-neon-magenta/30 hover:scale-[1.02] hover:border-neon-cyan/70
                 active:scale-[0.98]"
          style="animation: btnGlow 2s ease-in-out infinite;"
        >
          DRIVE
        </button>

        <!-- Neon Bottle Right -->
        <div class="flex-shrink-0" style="animation: floatDecor2 4.5s ease-in-out infinite; animation-delay: -1s;">
          <svg viewBox="0 0 24 24" class="w-8 h-8 sm:w-10 sm:h-10 opacity-90 drop-shadow-[0_0_15px_rgba(0,255,136,1)] text-neon-green">
            <path fill="currentColor" d="M12,2A1,1 0 0,0 11,3V6C10,6.5 9,7.5 9,9V19A2,2 0 0,0 11,21H13A2,2 0 0,0 15,19V9C15,7.5 14,6.5 13,6V3A1,1 0 0,0 12,2M12,4A1,1 0 0,1 13,5H11A1,1 0 0,1 12,4M11,7H13C13.5,7 14,7.5 14,8V19H10V8C10,7.5 10.5,7 11,7Z" />
          </svg>
        </div>
      </div>

      <!-- Controls Info -->
      <div class="mt-5 pt-4 border-t border-white/5 text-center">
        <p class="font-body text-xs text-gray-500">
          <span class="text-gray-400 font-medium">WASD</span> / <span class="text-gray-400 font-medium">Arrows</span> to drive &nbsp;·&nbsp; <span class="text-gray-400 font-medium">Space</span> to boost
        </p>
        <p class="font-body text-[10px] text-gray-600 mt-1">Drink to go fast. Try not to die.</p>
      </div>
    </div>

    <!-- ═══════════ CAR CUSTOMIZATION PANEL ═══════════ -->
    <div id="customizePanel" class="glass rounded-2xl p-4 sm:p-5 w-full max-w-md mx-4 my-auto max-h-[calc(100%-2rem)] overflow-y-auto no-scrollbar hidden" style="animation: floatIn 0.4s ease-out;">

      <div class="flex items-center justify-between mb-2">
        <h2 class="font-display text-lg font-bold tracking-wider text-neon-cyan">Customize</h2>
        <button id="customizeBack" class="font-display text-xs text-gray-400 hover:text-white transition-colors cursor-pointer">← Back</button>
      </div>

      <!-- Car Preview & Skin Carousel -->
      <div class="mb-2 relative flex items-center justify-center px-8">
        <button id="carouselPrev" class="absolute left-0 p-2 text-neon-cyan hover:scale-110 transition-transform cursor-pointer z-10">
          <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M15.41 16.58L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.42z"/></svg>
        </button>
        
        <div class="relative">
          <canvas id="carPreview" width="200" height="140" class="rounded-lg mx-auto" style="background: rgba(6,6,16,0.8);"></canvas>
          <!-- Locked Overlay -->
          <div id="skinLockedOverlay" class="absolute inset-0 z-20 bg-black/70 rounded-lg flex flex-col items-center justify-center hidden pointer-events-none border border-red-500/30">
            <svg class="w-6 h-6 text-red-400 mb-1 drop-shadow-[0_0_5px_rgba(255,0,0,0.8)]" viewBox="0 0 24 24"><path fill="currentColor" d="M12,17A2,2 0 0,0 14,15C14,13.89 13.1,13 12,13A2,2 0 0,0 10,15A2,2 0 0,0 12,17M18,8A2,2 0 0,1 20,10V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V10C4,8.89 4.9,8 6,8H7V6A5,5 0 0,1 12,1A5,5 0 0,1 17,6V8H18M12,3A3,3 0 0,0 9,6V8H15V6A3,3 0 0,0 12,3Z" /></svg>
            <span id="skinLockedText" class="text-[9px] text-gray-300 font-display text-center px-4 leading-tight uppercase tracking-wider"></span>
          </div>
        </div>

        <button id="carouselNext" class="absolute right-0 p-2 text-neon-cyan hover:scale-110 transition-transform cursor-pointer z-10">
          <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.42z"/></svg>
        </button>
      </div>
      
      <!-- Skin Name -->
      <div class="flex flex-col items-center mb-3 h-12 justify-start">
        <div id="carouselSkinName" class="font-display text-sm text-neon-cyan uppercase tracking-widest font-bold drop-shadow-[0_0_5px_rgba(0,255,136,0.5)] mb-1">Clean</div>
        <button id="equipSkinBtn" class="px-6 py-1 rounded-full font-display text-[10px] border border-neon-cyan text-neon-cyan hover:bg-neon-cyan hover:text-black transition-colors cursor-pointer hidden">EQUIP</button>
      </div>

      <!-- Color Picker -->
      <div class="mb-3">
        <label class="block font-display text-[10px] text-gray-400 tracking-widest uppercase mb-1">Body Color</label>
        <div id="colorSwatches" class="flex flex-wrap gap-2 justify-center p-1"></div>
      </div>

      <!-- Car Style -->
      <div class="mb-3">
        <label class="block font-display text-[10px] text-gray-400 tracking-widest uppercase mb-1">Body Style</label>
        <div class="flex gap-2 justify-center">
          <button class="car-style-btn px-4 py-1.5 rounded-lg font-display text-[10px] tracking-wider cursor-pointer bg-white/5 border border-white/10 text-gray-300 hover:border-neon-cyan/40 transition-all selected" data-style="sleek">Sleek</button>
          <button class="car-style-btn px-4 py-1.5 rounded-lg font-display text-[10px] tracking-wider cursor-pointer bg-white/5 border border-white/10 text-gray-300 hover:border-neon-cyan/40 transition-all" data-style="muscle">Muscle</button>
          <button class="car-style-btn px-4 py-1.5 rounded-lg font-display text-[10px] tracking-wider cursor-pointer bg-white/5 border border-white/10 text-gray-300 hover:border-neon-cyan/40 transition-all" data-style="compact">Compact</button>
        </div>
      </div>


      <!-- Glow Intensity -->
      <div class="mb-2">
        <label class="block font-display text-[10px] text-gray-400 tracking-widest uppercase mb-1">Glow Intensity</label>
        <input id="glowSlider" type="range" min="0" max="100" value="60"
               class="w-full h-1.5 rounded-full appearance-none cursor-pointer"
               style="background: linear-gradient(90deg, rgba(0,240,255,0.2), rgba(0,240,255,0.6));"
        />
      </div>

      <!-- Secret Code Redeem -->
      <div class="mt-4 pt-3 border-t border-white/10">
        <label for="skinCodeInput" class="block font-display text-[10px] text-gray-400 tracking-widest uppercase mb-1">Secret Code</label>
        <div class="flex gap-2">
          <input id="skinCodeInput" type="text" placeholder="Enter code..." class="flex-1 bg-black/50 border border-neon-cyan/20 rounded-lg px-3 py-1.5 text-white font-body text-xs outline-none focus:border-neon-cyan/60 uppercase">
          <button id="submitCodeBtn" class="bg-white/5 border border-white/10 rounded-lg px-3 font-display text-[10px] text-neon-cyan hover:bg-neon-cyan/20 transition-colors uppercase font-bold tracking-wider cursor-pointer">Redeem</button>
        </div>
        <div id="codeResultMsg" class="font-body text-[10px] mt-1 hidden text-center"></div>
      </div>
    </div> <!-- End customizePanel -->

  </div> <!-- End menuOverlay -->

        <!-- ═══════════ IN-GAME HUD ═══════════ -->
        <div id="gameHUD" class="hidden absolute inset-0 pointer-events-none">

    <!-- Promille Bar (Top Left) -->
    <div class="absolute top-5 left-2 sm:top-6 sm:left-4 w-36 sm:w-60 md:w-72">
      <div class="glass-subtle rounded-xl px-3 sm:px-4 py-2 sm:py-3">
        <div class="flex items-center justify-between mb-1">
          <span class="font-display text-[9px] sm:text-[10px] text-gray-400 tracking-widest uppercase">Blood Alcohol</span>
          <span id="promilleValue" class="font-display text-xs sm:text-sm font-bold text-neon-green">0.00‰</span>
        </div>
        <div class="w-full h-2.5 sm:h-3 bg-black/60 rounded-full overflow-hidden border border-white/5">
          <div id="promilleBarFill" class="h-full rounded-full transition-all duration-300 ease-out" style="width: 0%; background: linear-gradient(90deg, #00ff88, #00ff88);"></div>
        </div>
      </div>

      <!-- Effect Badges (below promille bar) -->
      <div id="effectBadges" class="flex flex-wrap justify-start gap-1.5 mt-1.5"></div>
    </div>



    <!-- Leaderboard (Top Right) -->
    <div class="absolute top-5 right-2 sm:top-6 sm:right-4 w-32 sm:w-44 md:w-52">
      <div class="glass-subtle rounded-xl px-3 py-2 sm:py-3">
        <div class="font-display text-[9px] sm:text-[10px] text-gray-400 tracking-widest uppercase mb-2 text-center">Leaderboard</div>
        <div id="leaderboardList" class="space-y-1"></div>
      </div>
    </div>

    <!-- Score (Bottom Center) -->
    <div class="absolute bottom-4 sm:bottom-6 left-1/2 -translate-x-1/2">
      <div class="glass-subtle rounded-xl px-5 py-1.5 sm:px-6 sm:py-2 text-center">
        <span class="font-display text-[9px] sm:text-xs text-gray-400 tracking-widest uppercase">Score</span>
        <div id="scoreValue" class="font-display text-xl sm:text-2xl font-bold text-white">0</div>
      </div>
    </div>

    <!-- Player Stats (Bottom Left above minimap) -->
    <div class="absolute bottom-[140px] sm:bottom-36 left-3 sm:left-4 w-32 sm:w-40 flex flex-col gap-2">
      <!-- HP Bar -->

        <div class="flex items-center justify-between mb-1">

(() => {

  // Init highscore UI on load
  document.addEventListener('DOMContentLoaded', updateMenuHighscoreUI);

  let customColor = CAR_COLORS[0];

  let customSkin = 'none';
  let currentPreviewSkin = 'none';
  let customGlow = 60;

  const EFFECT_LABELS = {
    'STEERING_INVERT': { label: 'INVERTED', icon: 'INV', color: '#ff8c00' },
    'STICKY_WHEEL': { label: 'STICKY', icon: 'STK', color: '#ff0066' },

    'SLIPPERY_TIRES': { label: 'ICE', icon: 'ICE', color: '#00f0ff' },

    'SUDDEN_ACCELERATION': { label: 'NOS JUMPS', icon: 'NOS', color: '#ff00e5' },
    'COLOR_TRIP': { label: 'TRIPPIN', icon: 'TRP', color: '#ff00ff' }
  };

  // ─── STATE ──────────────────────────────────────────────────
  let socket = null;
  let localId = null;
  let playing = false;
  let connected = false;
  let worldData = null;
  let pillars = [];

  const camera = { x: 0, y: 0, shakeX: 0, shakeY: 0, shakeTime: 0, wobblePhase: 0 };
  const keys = {};

  // Touch state
  const touchKeys = { up: false, down: false, left: false, right: false, boost: false };
  let isMobile = false;

  // ─── DOM REFS ───────────────────────────────────────────────
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const menuOverlay = document.getElementById('menuOverlay');
  const menuCard = document.getElementById('menuCard');
  const customizePanel = document.getElementById('customizePanel');
  const gameHUD = document.getElementById('gameHUD');
  const nicknameInput = document.getElementById('nicknameInput');
  const playBtn = document.getElementById('playBtn');
  const customizeBtn = document.getElementById('customizeBtn');
  const customizeBack = document.getElementById('customizeBack');

  const promilleValue = document.getElementById('promilleValue');
  const promilleBarFill = document.getElementById('promilleBarFill');
  const effectBadges = document.getElementById('effectBadges');
  const leaderboardList = document.getElementById('leaderboardList');
  const scoreValue = document.getElementById('scoreValue');
  const hpValue = document.getElementById('hpValue');
  const hpBarFill = document.getElementById('hpBarFill');
  const boostLabel = document.getElementById('boostLabel');
  const boostBarFill = document.getElementById('boostBarFill');

  const deathScreen = document.getElementById('deathScreen');
  const deathKiller = document.getElementById('deathKiller');
  const deathTimer = document.getElementById('deathTimer');

  const colorSwatches = document.getElementById('colorSwatches');
  const carPreviewCanvas = document.getElementById('carPreview');
  const carPreviewCtx = carPreviewCanvas.getContext('2d');
  const glowSlider = document.getElementById('glowSlider');

  // ─── DETECT MOBILE ─────────────────────────────────────────
  function detectMobile() {
    isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || window.innerWidth < 640;
    const tc = document.getElementById('touchControls');
    if (tc) {
      if (isMobile) tc.classList.remove('hidden');
      else tc.classList.add('hidden');
    }
  }
  detectMobile();
  window.addEventListener('resize', detectMobile);

  // ─── CANVAS RESIZE ─────────────────────────────────────────
  function resizeCanvas() {
    const container = document.getElementById('gameContainer') || document.body;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ─── UTILITIES ──────────────────────────────────────────────
  function lerp(a, b, t) { return a + (b - a) * t; }

  function lerpAngle(a, b, t) {
    let diff = b - a;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    return a + diff * t;
  }

  function getPromilleColor(p) {
    if (p < 1.5) return lerpColor('#00ff88', '#ffd700', p / 1.5);
    if (p < 3.0) return lerpColor('#ffd700', '#ff8800', (p - 1.5) / 1.5);
    return lerpColor('#ff8800', '#ff0044', (p - 3.0) / 1.5);
  }

  function lerpColor(c1, c2, t) {
    t = Math.max(0, Math.min(1, t));
    const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
    const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    return `rgb(${r},${g},${b})`;
  }

  function hexToRgba(hex, alpha) {
    if (hex.startsWith('rgb')) {
      const m = hex.match(/(\d+)/g);
      if (m) return `rgba(${m[0]},${m[1]},${m[2]},${alpha})`;
    }
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function worldToScreen(wx, wy) {
    return {
      x: wx - camera.x + canvas.width / 2 + camera.shakeX,
      y: wy - camera.y + canvas.height / 2 + camera.shakeY
    };
  }

  function isOnScreen(wx, wy, margin) {
    const s = worldToScreen(wx, wy);
    return s.x > -margin && s.x < canvas.width + margin &&
           s.y > -margin && s.y < canvas.height + margin;
  }

  function getCarDims(style) {
    return CAR_STYLES[style] || CAR_STYLES.sleek;
  }

  // ─── PARTICLE SYSTEM ───────────────────────────────────────
  function addParticle(p) {
    if (particles.length >= MAX_PARTICLES) particles.shift();
    p.maxLife = p.life;
    particles.push(p);
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function spawnExhaust(player) {
    const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
    if (speed < 0.3) return;

    const emitRate = player.boosting ? 0.9 : speed / 6;
    if (Math.random() > emitRate) return;

    const dims = getCarDims(customStyle);
    const rearX = player.rx - Math.cos(player.rAngle) * (dims.w / 2);
    const rearY = player.ry - Math.sin(player.rAngle) * (dims.w / 2);

    const prom = player.promille || 0;
    let color;
    if (player.boosting) {
      color = Math.random() > 0.5 ? '#00f0ff' : '#ffffff';
    } else if (prom < 1.5) {
      color = lerpColor('#00f0ff', '#ffd700', prom / 1.5);
    } else if (prom < 3) {
      color = lerpColor('#ffd700', '#ff8800', (prom - 1.5) / 1.5);
    } else {
      color = lerpColor('#ff8800', '#ff00e5', (prom - 3) / 1.5);
    }

    const spread = player.boosting ? 1.2 : 0.6;
    addParticle({
      x: rearX + (Math.random() - 0.5) * 8,
      y: rearY + (Math.random() - 0.5) * 8,
      vx: -Math.cos(player.rAngle) * speed * 0.3 + (Math.random() - 0.5) * spread,
      vy: -Math.sin(player.rAngle) * speed * 0.3 + (Math.random() - 0.5) * spread,
      life: 0.25 + Math.random() * 0.5,
      color: color,
      size: player.boosting ? 3 + Math.random() * 4 : 2 + Math.random() * 3
    });
  }

  function spawnCollisionSparks(wx, wy) {
    for (let i = 0; i < 18; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 1 + Math.random() * 3;
      addParticle({
        x: wx, y: wy,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 0.2 + Math.random() * 0.4,
        color: Math.random() > 0.5 ? '#ffd700' : '#ff8800',
        size: 2 + Math.random() * 2
      });
    }
    camera.shakeTime = 0.2;
  }

  function spawnPickupBurst(wx, wy, color) {
    for (let i = 0; i < 14; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 0.8 + Math.random() * 2;
      addParticle({
        x: wx, y: wy,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 0.3 + Math.random() * 0.5,
        color: color,
        size: 3 + Math.random() * 3
      });
    }
  }

  // ─── DRAWING HELPERS ────────────────────────────────────────
  function drawRoundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.arcTo(x + w, y, x + w, y + r, r);
    c.lineTo(x + w, y + h - r);
    c.arcTo(x + w, y + h, x + w - r, y + h, r);
    c.lineTo(x + r, y + h);
    c.arcTo(x, y + h, x, y + h - r, r);
    c.lineTo(x, y + r);
    c.arcTo(x, y, x + r, y, r);
    c.closePath();
  }



  // ─── RENDER: GRID ───────────────────────────────────────────
  function drawGrid() {
    if (!worldData) return;
    const ww = worldData.width;
    const wh = worldData.height;
    const startX = Math.floor((camera.x - canvas.width / 2) / GRID_SIZE) * GRID_SIZE;
    const endX = camera.x + canvas.width / 2 + GRID_SIZE;
    const startY = Math.floor((camera.y - canvas.height / 2) / GRID_SIZE) * GRID_SIZE;
    const endY = camera.y + canvas.height / 2 + GRID_SIZE;

    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let gx = startX; gx <= endX; gx += GRID_SIZE) {
      if (gx < 0 || gx > ww) continue;
      const s = worldToScreen(gx, Math.max(0, startY));
      const e = worldToScreen(gx, Math.min(wh, endY));
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(e.x, e.y);
    }
    for (let gy = startY; gy <= endY; gy += GRID_SIZE) {
      if (gy < 0 || gy > wh) continue;
      const s = worldToScreen(Math.max(0, startX), gy);
      const e = worldToScreen(Math.min(ww, endX), gy);
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(e.x, e.y);
    }
    ctx.stroke();
  }

  // ─── RENDER: WORLD BORDER ──────────────────────────────────
  function drawBorder() {
    if (!worldData) return;
    const tl = worldToScreen(borderMargin, borderMargin);
    const br = worldToScreen(worldData.width - borderMargin, worldData.height - borderMargin);
    const w = br.x - tl.x;
    const h = br.y - tl.y;

    ctx.save();
    ctx.strokeStyle = '#ff003c';
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#ff003c';
    ctx.lineWidth = 3;
    ctx.strokeRect(tl.x, tl.y, w, h);
    ctx.restore();

    ctx.fillStyle = 'rgba(255, 0, 60, 0.06)';
    const otl = worldToScreen(0, 0);
    const obr = worldToScreen(worldData.width, worldData.height);
    ctx.fillRect(otl.x, otl.y, obr.x - otl.x, tl.y - otl.y);
    ctx.fillRect(otl.x, br.y, obr.x - otl.x, obr.y - br.y);
    ctx.fillRect(otl.x, tl.y, tl.x - otl.x, br.y - tl.y);
    ctx.fillRect(br.x, tl.y, obr.x - br.x, br.y - tl.y);
  }

  // ─── RENDER: PILLARS ───────────────────────────────────────
  function drawPillars() {
    const time = performance.now() / 1000;
    for (const p of pillars) {
      if (!isOnScreen(p.x, p.y, p.radius + 30)) continue;
      const s = worldToScreen(p.x, p.y);
      ctx.save();
      ctx.translate(s.x, s.y);
      
      // Outer glow and base
      // Outer glow and base
      const grad = ctx.createRadialGradient(0, 0, p.radius * 0.3, 0, 0, p.radius);
      grad.addColorStop(0, 'rgba(139, 92, 246, 0.4)');
      grad.addColorStop(0.8, 'rgba(139, 92, 246, 0.1)');
      grad.addColorStop(1, 'rgba(0, 0, 0, 0.8)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
      ctx.fill();
      
      // Cyber border
      ctx.strokeStyle = '#8b5cf6';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Rotating dashed ring
      // Rotating dashed ring
      ctx.rotate(time * 0.5);
      ctx.strokeStyle = '#00f0ff';
      ctx.lineWidth = 2;
      ctx.setLineDash([15, 10]);
      ctx.beginPath();
      ctx.arc(0, 0, p.radius * 0.75, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // Inner pulsating core
      const pulse = 0.5 + Math.sin(time * 4) * 0.5;
      ctx.rotate(-time * 1.2);
      ctx.fillStyle = `rgba(139, 92, 246, ${0.4 + pulse * 0.4})`;
      ctx.beginPath();
      ctx.moveTo(0, -p.radius * 0.3);
      ctx.lineTo(p.radius * 0.25, p.radius * 0.15);
      ctx.lineTo(-p.radius * 0.25, p.radius * 0.15);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }
  }

  // ─── RENDER: DEATH PITS ────────────────────────────────────
  function drawPits() {
    const time = performance.now() / 1000;
    for (const pit of pits) {
      const tl = worldToScreen(pit.x, pit.y);
      const br = worldToScreen(pit.x + pit.w, pit.y + pit.h);
      const pw = br.x - tl.x;
      const ph = br.y - tl.y;
      if (tl.x > canvas.width || br.x < 0 || tl.y > canvas.height || br.y < 0) continue;
      
      ctx.save();
      // Abyss background
      ctx.fillStyle = '#020204';
      ctx.fillRect(tl.x, tl.y, pw, ph);

      // Deep glowing grid
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255, 0, 60, 0.15)';
      ctx.lineWidth = 1;
      const gridOfs = (time * 20) % 30;
      for (let x = gridOfs; x < pw; x += 30) { ctx.moveTo(tl.x + x, tl.y); ctx.lineTo(tl.x + x, tl.y + ph); }
      for (let y = gridOfs; y < ph; y += 30) { ctx.moveTo(tl.x, tl.y + y); ctx.lineTo(tl.x + pw, tl.y + y); }
      ctx.stroke();

      // Inner shadow for depth
      const grad = ctx.createRadialGradient(tl.x + pw / 2, tl.y + ph / 2, 0, tl.x + pw / 2, tl.y + ph / 2, Math.max(pw, ph) / 1.5);
      grad.addColorStop(0, 'rgba(0,0,0,0.95)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(tl.x, tl.y, pw, ph);

      // Pulsing border with danger tape
      const pulse = 0.5 + Math.sin(time * 3) * 0.5;
      ctx.strokeStyle = `rgba(255, 0, 60, ${0.4 + pulse * 0.6})`;
      ctx.lineWidth = 3;
      ctx.strokeStyle = `rgba(255, 0, 60, ${0.4 + pulse * 0.6})`;
      ctx.lineWidth = 3;
      ctx.strokeRect(tl.x, tl.y, pw, ph);

      // Danger stripes around the inside
      // Danger stripes around the inside
      ctx.strokeStyle = `rgba(255, 100, 0, ${0.5 + pulse * 0.3})`;
      ctx.lineWidth = 4;
      ctx.setLineDash([20, 20]);
      ctx.lineDashOffset = -time * 30;
      ctx.strokeRect(tl.x + 2, tl.y + 2, pw - 4, ph - 4);
      ctx.setLineDash([]);

      ctx.restore();
    }
  }

  // ─── RENDER: ITEMS ─────────────────────────────────────────
  function drawItems() {
    const time = performance.now() / 1000;
    for (const item of serverItems) {
      if (!isOnScreen(item.x, item.y, 40)) continue;
      const s = worldToScreen(item.x, item.y);
      const pulse = 0.6 + Math.sin(time * 4 + item.id) * 0.4;
      ctx.save();
      if (item.type === 'drink') {
        const info = EFFECT_LABELS[item.effect] || { color: '#ff00e5', icon: 'DRNK' };
        ctx.strokeStyle = hexToRgba(info.color, 0.15 + pulse * 0.2);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 18 + pulse * 3, 0, Math.PI * 2);
        ctx.stroke();
        
        const grad = ctx.createRadialGradient(s.x, s.y - 2, 2, s.x, s.y, 12);
        grad.addColorStop(0, hexToRgba(info.color, 0.6));
        grad.addColorStop(1, hexToRgba(info.color, 0.1));
        ctx.fillStyle = grad;
        
        ctx.beginPath();
        const shapeType = (item.effect && item.effect.length) ? item.effect.length % 3 : 0;
        if (shapeType === 0) {
          // Martini Glass
          ctx.moveTo(s.x - 8, s.y - 6);
          ctx.lineTo(s.x + 8, s.y - 6);
          ctx.lineTo(s.x, s.y + 4);
          ctx.lineTo(s.x, s.y + 10);
          ctx.moveTo(s.x - 4, s.y + 10);
          ctx.lineTo(s.x + 4, s.y + 10);
        } else if (shapeType === 1) {
          // Pint Glass
          ctx.moveTo(s.x - 5, s.y - 8);
          ctx.lineTo(s.x + 5, s.y - 8);
          ctx.lineTo(s.x + 4, s.y + 10);
          ctx.lineTo(s.x - 4, s.y + 10);
        } else {
          // Bottle / Flask
          ctx.moveTo(s.x - 5, s.y + 10);
          ctx.lineTo(s.x - 5, s.y - 2);
          ctx.lineTo(s.x - 3, s.y - 5);
          ctx.lineTo(s.x - 3, s.y - 10);
          ctx.lineTo(s.x + 3, s.y - 10);
          ctx.lineTo(s.x + 3, s.y - 5);
          ctx.lineTo(s.x + 5, s.y - 2);
          ctx.lineTo(s.x + 5, s.y + 10);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = info.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        

      } else {
        ctx.strokeStyle = hexToRgba('#00ff88', 0.15 + pulse * 0.2);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 18 + pulse * 3, 0, Math.PI * 2);
        ctx.stroke();
        const grad = ctx.createRadialGradient(s.x, s.y - 1, 2, s.x, s.y, 11);
        grad.addColorStop(0, 'rgba(0, 255, 136, 0.5)');
        grad.addColorStop(1, 'rgba(0, 255, 136, 0.08)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.strokeStyle = 'rgba(0, 255, 136, 0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(s.x - 4, s.y); ctx.lineTo(s.x + 4, s.y);
        ctx.moveTo(s.x, s.y - 4); ctx.lineTo(s.x, s.y + 4);
        ctx.stroke();

      }
      ctx.restore();
    }
  }

  // ─── RENDER: VEHICLE ───────────────────────────────────────
  function drawVehicleShape(c, carW, carH, color, skin, glowAmt, boosting) {
    const glowRatio = glowAmt / 100;
    
    c.shadowColor = color;
    // Left = 0 blur. Right = 25 blur (keeps it focused but visible)
    c.shadowBlur = boosting ? glowRatio * 40 : glowRatio * 25;
    
    c.fillStyle = hexToRgba(color, boosting ? 0.3 : 0.15);
    drawRoundRect(c, -carW / 2, -carH / 2, carW, carH, CAR_CORNER);
    c.fill();
    
    c.strokeStyle = color;
    c.lineWidth = boosting ? 2.5 : 2;
    drawRoundRect(c, -carW / 2, -carH / 2, carW, carH, CAR_CORNER);
    c.stroke();

    // To make the glow "extremely strong" at 100%, we draw the stroke multiple times
    // This layers the blur additively, creating a blinding neon effect without diluting it
    if (glowRatio > 0) {
      const extraLayers = Math.floor(glowRatio * 4); // Up to 4 extra layers of pure glow!
      for (let i = 0; i < extraLayers; i++) {
        c.stroke();
      }
    }

    c.shadowBlur = 0;
    c.strokeStyle = hexToRgba(color, 0.2);
    c.lineWidth = 1;
    drawRoundRect(c, -carW / 2 + 4, -carH / 2 + 3, carW - 8, carH - 6, 2);
    c.stroke();

    // ─── DRAW SKINS ─────────────────
    c.save();
    c.clip(); // Ensure patterns don't draw outside the car bounds
    const time = performance.now();

    if (skin === 'stripes') {
      c.fillStyle = 'rgba(255, 255, 255, 0.6)';
      c.fillRect(-carW / 2, -5, carW, 2);
      c.fillRect(-carW / 2, 3, carW, 2);
    } else if (skin === 'taxi') {
      c.fillStyle = '#ffcc00';
      c.fillRect(-carW / 2 + 5, -carH / 2 + 2, carW - 10, carH - 4);
      c.fillStyle = '#000';
      for (let x = -carW / 2 + 10; x < carW / 2 - 10; x += 6) {
        c.fillRect(x, -3, 3, 3);
        c.fillRect(x + 3, 0, 3, 3);
      }
    } else if (skin === 'police') {
      const isRed = (Math.floor(time / 150) % 2) === 0;
      c.fillStyle = isRed ? '#ff0000' : '#0000ff';
      c.shadowColor = isRed ? '#ff0000' : '#0000ff';
      c.shadowBlur = 10;
      c.fillRect(-2, -carH / 2 + 2, 4, carH - 4);
      c.shadowBlur = 0;
    } else if (skin === 'zebra') {
      c.fillStyle = 'rgba(255,255,255,0.7)';
      c.beginPath();
      for (let x = -carW / 2; x < carW / 2; x += 10) {
        c.moveTo(x, -carH / 2);
        c.lineTo(x + 5, 0);
        c.lineTo(x, carH / 2);
        c.lineTo(x + 4, carH / 2);
        c.lineTo(x + 9, 0);
        c.lineTo(x + 4, -carH / 2);
      }
      c.fill();
    } else if (skin === 'ghost') {
      c.fillStyle = 'rgba(255, 255, 255, 0.4)';
      c.shadowColor = '#ffffff';
      c.shadowBlur = 15;
      drawRoundRect(c, -carW / 4, -carH / 4, carW / 2, carH / 2, 5);
      c.fill();
    } else if (skin === 'demon') {
      const grad = c.createLinearGradient(-carW/2, 0, carW/2, 0);
      grad.addColorStop(0, '#ff0000');
      grad.addColorStop(1, '#ffaa00');
      c.fillStyle = grad;
      c.beginPath();
      c.moveTo(carW/2, 0);
      c.lineTo(carW/4, -carH/3);
      c.lineTo(0, -carH/6);
      c.lineTo(-carW/4, -carH/2);
      c.lineTo(-carW/2, 0);
      c.lineTo(-carW/4, carH/2);
      c.lineTo(0, carH/6);
      c.lineTo(carW/4, carH/3);
      c.fill();
    } else if (skin === 'cyberpunk') {
      c.strokeStyle = '#00f0ff';
      c.lineWidth = 1;
      for (let x = -carW/2 + 5; x < carW/2; x += 8) {
        c.beginPath(); c.moveTo(x, -carH/2); c.lineTo(x, carH/2); c.stroke();
      }
      c.strokeStyle = '#ff00e5';
      for (let y = -carH/2 + 5; y < carH/2; y += 8) {
        c.beginPath(); c.moveTo(-carW/2, y); c.lineTo(carW/2, y); c.stroke();
      }
    } else if (skin === 'gold') {
      const g = c.createLinearGradient(-carW/2, -carH/2, carW/2, carH/2);
      g.addColorStop(0, '#bf953f');
      g.addColorStop(0.25, '#fcf6ba');
      g.addColorStop(0.5, '#b38728');
      g.addColorStop(0.75, '#fbf5b7');
      g.addColorStop(1, '#aa771c');
      c.fillStyle = g;
      c.fillRect(-carW/2, -carH/2, carW, carH);
    } else if (skin === 'veteran') {
      c.fillStyle = '#4a5d23'; // base camo
      c.fillRect(-carW/2, -carH/2, carW, carH);
      c.fillStyle = '#313d17';
      c.beginPath(); c.arc(-carW/4, -carH/4, 6, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(carW/6, carH/3, 8, 0, Math.PI*2); c.fill();
      c.fillStyle = '#222';
      c.beginPath(); c.arc(0, 0, 5, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(carW/3, -carH/3, 4, 0, Math.PI*2); c.fill();
    } else if (skin === 'void') {
      c.fillStyle = '#000';
      c.fillRect(-carW/2, -carH/2, carW, carH);
      c.shadowColor = '#aa00ff';
      c.shadowBlur = 20;
      c.strokeStyle = '#fff';
      c.lineWidth = 2;
      drawRoundRect(c, -carW/2 + 2, -carH/2 + 2, carW - 4, carH - 4, 3);
      c.stroke();
      c.shadowBlur = 0;
    } else if (skin === 'warlord') {
      c.fillStyle = '#222';
      c.fillRect(-carW/2, -carH/2, carW, carH);
      c.fillStyle = '#8b0000'; 
      c.beginPath(); c.arc(-carW/4, -carH/4, 8, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(0, carH/3, 12, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(carW/3, 0, 10, 0, Math.PI*2); c.fill();
      c.fillStyle = '#ff0000'; 
      for (let i = 0; i < 15; i++) {
        let x = -carW/2 + Math.random()*carW;
        let y = -carH/2 + Math.random()*carH;
        c.fillRect(x, y, 2 + Math.random()*2, 2 + Math.random()*2);
      }
    } else if (skin === 'community') {
      c.fillStyle = '#051005';
      c.fillRect(-carW/2, -carH/2, carW, carH);
      c.fillStyle = '#00ff88';
      c.font = '8px Orbitron';
      c.fillText('1010', -carW/2 + 2, -carH/4);
      c.fillText('0101', -carW/4 + 5, carH/3);
      c.fillStyle = '#fff';
      c.shadowColor = '#00ff88';
      c.shadowBlur = 5;
      c.fillText('</>', -5, 3);
      c.shadowBlur = 0;
    } else if (skin === 'owner') {
      const timeSec = time / 500;
      const g = c.createRadialGradient(0, 0, 0, 0, 0, carW);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.3, `hsl(${timeSec * 60 % 360}, 100%, 50%)`);
      g.addColorStop(0.8, `hsl(${(timeSec * 60 + 180) % 360}, 100%, 50%)`);
      g.addColorStop(1, '#000000');
      c.fillStyle = g;
      c.fillRect(-carW/2, -carH/2, carW, carH);
      c.shadowColor = '#ffffff';
      c.shadowBlur = 20;
      c.strokeStyle = '#ffffff';
      c.lineWidth = 2;
      drawRoundRect(c, -carW/4, -carH/4, carW/2, carH/2, 2);
      c.stroke();
      c.shadowBlur = 0;
    }
    c.restore();

    // Headlights
    c.shadowColor = '#ffffff';
    c.shadowBlur = 8;
    c.fillStyle = 'rgba(255,255,255,0.9)';
    c.beginPath(); c.arc(carW / 2 - 5, -carH / 4, 2.5, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(carW / 2 - 5, carH / 4, 2.5, 0, Math.PI * 2); c.fill();

    // Headlight beams
    c.shadowBlur = 0;
    const beamGrad = c.createLinearGradient(carW / 2, 0, carW / 2 + 30, 0);
    beamGrad.addColorStop(0, 'rgba(255,255,255,0.08)');
    beamGrad.addColorStop(1, 'rgba(255,255,255,0)');
    c.fillStyle = beamGrad;
    c.beginPath();
    c.moveTo(carW / 2 - 2, -carH / 4 - 3);
    c.lineTo(carW / 2 + 35, -carH / 2 - 8);
    c.lineTo(carW / 2 + 35, carH / 2 + 8);
    c.lineTo(carW / 2 - 2, carH / 4 + 3);
    c.closePath();
    c.fill();

    // Tail lights
    c.fillStyle = 'rgba(255, 0, 60, 0.8)';
    c.shadowColor = '#ff003c';
    c.shadowBlur = boosting ? 12 : 6;
    c.beginPath(); c.arc(-carW / 2 + 4, -carH / 4, 2, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(-carW / 2 + 4, carH / 4, 2, 0, Math.PI * 2); c.fill();
    c.shadowBlur = 0;
  }

  function drawVehicle(p, isLocal) {
    if (!p.alive && !isLocal) return;
    if (!isOnScreen(p.rx, p.ry, 80)) return;
    const s = worldToScreen(p.rx, p.ry);
    let color = p.color || '#00f0ff';
    
    if (p.effects && p.effects.some(e => e.type === 'COLOR_TRIP')) {
      color = CAR_COLORS[Math.floor(performance.now() / 150) % CAR_COLORS.length];
    }

    const dims = getCarDims(p.style || 'sleek');
    const glow = p.glow !== undefined ? p.glow : 60;

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(p.rAngle);
    drawVehicleShape(ctx, dims.w, dims.h, color, p.skin, glow, p.boosting);
    ctx.restore();

    // Labels
    ctx.save();
    ctx.shadowBlur = 0;
    ctx.textAlign = 'center';
    if (p.hp < 100) {
      const barW = 34, barH = 3, barY = s.y - 30;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(s.x - barW / 2, barY, barW, barH);
      const hpFrac = Math.max(0, p.hp / 100);
      ctx.fillStyle = hpFrac > 0.5 ? '#00ff88' : hpFrac > 0.25 ? '#ffd700' : '#ff0044';
      ctx.fillRect(s.x - barW / 2, barY, barW * hpFrac, barH);
    }
    ctx.font = '500 11px Inter';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(p.name, s.x, s.y - 36);
    const prom = p.promille || 0;
    if (prom > 0) {
      ctx.font = '600 9px Orbitron';
      ctx.fillStyle = getPromilleColor(prom);
      ctx.fillText(prom.toFixed(2) + '‰', s.x, s.y - 46);
    }
    ctx.restore();
  }

  // ─── RENDER: PARTICLES ─────────────────────────────────────
  function drawParticles() {
    for (const p of particles) {
      if (!isOnScreen(p.x, p.y, 10)) continue;
      const s = worldToScreen(p.x, p.y);
      const alpha = (p.life / p.maxLife) * 0.8;
      const size = p.size * (p.life / p.maxLife);
      ctx.fillStyle = hexToRgba(p.color, alpha);
      ctx.beginPath();
      ctx.arc(s.x, s.y, Math.max(0.1, size), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawKingPointer() {
    if (!leaderboard || leaderboard.length === 0) return;
    const kingId = leaderboard[0].id;
    if (kingId === localId) return; // You are the king

    const kingPlayer = serverPlayers.find(p => p.id === kingId);
    if (!kingPlayer || !kingPlayer.alive) return;

    const localPlayer = renderPlayers[localId];
    if (!localPlayer) return;

    const dx = kingPlayer.x - localPlayer.rx;
    const dy = kingPlayer.y - localPlayer.ry;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 400) return; // Only show if sufficiently far away

    const angle = Math.atan2(dy, dx);
    const sCenter = worldToScreen(localPlayer.rx, localPlayer.ry);
    
    const radius = 100;
    const ix = sCenter.x + Math.cos(angle) * radius;
    const iy = sCenter.y + Math.sin(angle) * radius;

    ctx.save();
    ctx.translate(ix, iy);
    ctx.rotate(angle);
    
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 15;
    ctx.fillStyle = 'rgba(255, 215, 0, 0.8)';
    
    ctx.beginPath();
    ctx.moveTo(12, 0);
    ctx.lineTo(-8, 8);
    ctx.lineTo(-4, 0);
    ctx.lineTo(-8, -8);
    ctx.closePath();
    ctx.fill();

    ctx.rotate(-angle);
    ctx.font = '10px Orbitron';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 0;
    ctx.fillText('1ST', Math.cos(angle) * 18, Math.sin(angle) * 18);
    
    ctx.restore();
  }


  // ─── RENDER: VISUAL EFFECTS ────────────────────────────────
  function drawDoubleVision() {
    const local = getLocalPlayer();
    if (!local) return;
    ctx.save();
    ctx.globalAlpha = 0.25;
    for (const p of serverPlayers) {
      if (p.id === localId || !p.alive) continue;
      const rp = renderPlayers[p.id];
      if (!rp) continue;
      const d = Math.sqrt(Math.pow(rp.rx - local.rx, 2) + Math.pow(rp.ry - local.ry, 2));
      if (d > 600) continue;
      const ghost1 = { ...rp, rx: rp.rx + 25, ry: rp.ry + 15 };
      drawVehicle(ghost1, false);
      const ghost2 = { ...rp, rx: rp.rx - 20, ry: rp.ry - 25 };
      drawVehicle(ghost2, false);
    }
    ctx.restore();
  }

  function drawTunnelVision() {
    const time = performance.now() / 1000;
    const radius = 180 + Math.sin(time * 2.5) * 50;
    const cx = canvas.width / 2 + camera.shakeX;
    const cy = canvas.height / 2 + camera.shakeY;
    const grad = ctx.createRadialGradient(cx, cy, radius * 0.4, cx, cy, radius);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.7, 'rgba(0,0,0,0.5)');
    grad.addColorStop(1, 'rgba(0,0,0,0.92)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ─── CAMERA ─────────────────────────────────────────────────
  function updateCamera(dt) {
    const local = getLocalPlayer();
    if (!local) return;
    camera.x += (local.rx - camera.x) * 0.1;
    camera.y += (local.ry - camera.y) * 0.1;
    if (camera.shakeTime > 0) {
      camera.shakeTime -= dt;
      camera.shakeX = (Math.random() - 0.5) * 7;
      camera.shakeY = (Math.random() - 0.5) * 7;
    } else {
      camera.shakeX *= 0.8;
      camera.shakeY *= 0.8;
    }
    const prom = local.promille || 0;
    if (prom > 1.0) {
      camera.wobblePhase += dt * (1.5 + prom * 0.5);
      const wobbleIntensity = (prom - 1.0) * 2.5;
      camera.shakeX += Math.sin(camera.wobblePhase) * wobbleIntensity;
      camera.shakeY += Math.cos(camera.wobblePhase * 0.7) * wobbleIntensity * 0.6;
    }
  }


  // ─── UI UPDATES ─────────────────────────────────────────────
  function getLocalPlayer() {
    return renderPlayers[localId] || null;
  }
  function getLocalServerPlayer() {
    return serverPlayers.find(p => p.id === localId) || null;
  }

  function updatePromilleUI() {
    const p = getLocalServerPlayer();
    if (!p) return;
    const prom = p.promille || 0;
    const pct = (prom / 4.5) * 100;
    const color = getPromilleColor(prom);
    promilleValue.textContent = prom.toFixed(2) + '‰';
    promilleValue.style.color = color;
    promilleBarFill.style.width = pct + '%';
    if (prom < 1.5) promilleBarFill.style.background = `linear-gradient(90deg, #00ff88, ${color})`;
    else if (prom < 3.0) promilleBarFill.style.background = `linear-gradient(90deg, #00ff88, #ffd700, ${color})`;
    else promilleBarFill.style.background = `linear-gradient(90deg, #00ff88, #ffd700, #ff8800, ${color})`;
    if (prom >= 4.0) promilleBarFill.parentElement.classList.add('promille-blink');
    else promilleBarFill.parentElement.classList.remove('promille-blink');
  }

  function updateHPUI() {
    const p = getLocalServerPlayer();
    if (!p) return;
    const hp = Math.max(0, Math.round(p.hp));
    hpValue.textContent = hp;
    hpBarFill.style.width = hp + '%';
    if (hp > 60) { hpBarFill.style.background = '#00ff88'; hpValue.style.color = '#00ff88'; }
    else if (hp > 30) { hpBarFill.style.background = '#ffd700'; hpValue.style.color = '#ffd700'; }
    else { hpBarFill.style.background = '#ff0044'; hpValue.style.color = '#ff0044'; }
  }

  function updateBoostUI() {
    const p = getLocalServerPlayer();
    if (!p) return;
    if (p.boosting) {
      boostLabel.textContent = 'ACTIVE';
      boostLabel.style.color = '#ffd700';
      boostBarFill.style.background = 'linear-gradient(90deg, #ffd700, #ff8800)';
      boostBarFill.style.width = '100%';
    } else if (p.boostCooldownPct > 0) {
      boostLabel.textContent = 'COOLDOWN';
      boostLabel.style.color = '#ff4466';
      boostBarFill.style.background = '#ff4466';
      boostBarFill.style.width = ((1 - p.boostCooldownPct) * 100) + '%';
    } else {
      boostLabel.textContent = 'READY';
      boostLabel.style.color = '#00f0ff';
      boostBarFill.style.background = '#00f0ff';
      boostBarFill.style.width = '100%';
    }
  }

  function updateScoreUI() {
    const p = getLocalServerPlayer();
    if (!p) return;
    scoreValue.textContent = p.score;
  }

  function updateEffectBadgesUI() {
    const p = getLocalServerPlayer();
    if (!p) return;
    const effects = p.effects || [];
    let html = '';
    for (const e of effects) {
      const info = EFFECT_LABELS[e.type] || { label: e.type, icon: 'EFF', color: '#fff' };
      const secs = Math.ceil(e.remaining);
      html += `<div class="flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[9px] font-display font-bold tracking-wider pointer-events-none"
                    style="background: rgba(0,0,0,0.6); border: 1px solid ${info.color}44; color: ${info.color}; animation: badgePulse 1s ease-in-out infinite;">
                <span>${info.icon}</span><span>${info.label}</span><span class="opacity-70">${secs}s</span>
              </div>`;
    }
    effectBadges.innerHTML = html;
  }

  function updateLeaderboardUI(data) {
    let html = '';
    const formatTime = (secs) => {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    };
    for (let i = 0; i < data.length; i++) {
      const entry = data[i];
      const isLocal = entry.id === localId;
      const rankIcon = i === 0 ? '1ST' : (i + 1).toString();
      html += `<div class="flex items-center justify-between py-1 px-1 rounded ${isLocal ? 'bg-white/5' : ''}">
                 <div class="flex items-center gap-1 sm:gap-2">
                   <span class="text-[9px] sm:text-xs w-4 sm:w-5 text-center">${rankIcon}</span>
                   <span class="font-body text-[10px] sm:text-xs ${isLocal ? 'text-neon-cyan font-semibold' : 'text-gray-300'} truncate max-w-[50px] sm:max-w-[90px]">${entry.name}</span>
                 </div>
                 <span class="font-display text-[9px] sm:text-xs font-bold ${isLocal ? 'text-neon-cyan' : 'text-gray-400'}">${entry.score} pts | ${formatTime(entry.time)}</span>
               </div>`;
    }
    leaderboardList.innerHTML = html;
  }

  function evaluateSkinUnlocks() {
    let newlyUnlocked = [];
    for (const [skinKey, skinData] of Object.entries(CAR_SKINS)) {
      if (skinKey !== 'none' && !unlockedSkins.includes(skinKey)) {
        if (skinData.condition(localStats)) {
          unlockedSkins.push(skinKey);
          newlyUnlocked.push(skinKey);
        }
      }
    }
    if (newlyUnlocked.length > 0) {
      saveStats();
      initCustomizer();
    }
    return newlyUnlocked;
  }

  function showSkinUnlockPopup(skins, data) {
    if (skins.length === 0) {
      const p = getLocalServerPlayer();
      if (!p || !p.alive) {
        finalizeDeathScreenUI(data);
      }
      return;
    }
    if (deathTimerInterval) { clearInterval(deathTimerInterval); deathTimerInterval = null; }

    const skinKey = skins[0];
    const skinInfo = CAR_SKINS[skinKey];
    
    document.getElementById('unlockSkinName').textContent = skinInfo.label;
    
    const popup = document.getElementById('skinUnlockPopup');
    const btnClose = document.getElementById('unlockCloseBtn');
    const btnEquip = document.getElementById('unlockEquipBtn');
    
    const canvas = document.getElementById('unlockCarPreview');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const dims = getCarDims(customStyle);
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    drawVehicleShape(ctx, dims.w * 2, dims.h * 2, customColor, skinKey, customGlow, false);
    ctx.restore();
    
    popup.classList.remove('hidden');
    
    const cleanup = () => {
      popup.classList.add('hidden');
      btnClose.removeEventListener('click', onClose);
      btnEquip.removeEventListener('click', onEquip);
      showSkinUnlockPopup(skins.slice(1), data);
    };
    
    const onClose = () => cleanup();
    const onEquip = () => {
      customSkin = skinKey;
      if (socket && connected) {
        socket.emit('update_appearance', {
          color: customColor,
          style: customStyle,
          glow: customGlow,
          skin: customSkin
        });
      }
      cleanup();
    };
    
    btnClose.addEventListener('click', onClose);
    btnEquip.addEventListener('click', onEquip);
  }

  function showDeathScreenUI(data) {
    if (data.reason === 'pit') {
      localStats.deathsByPit++;
      saveStats();
    }
    
    let currentScore = data.finalScore || 0;
    if (currentScore > localStats.highScore) {
      localStats.highScore = currentScore;
      saveStats();
    }
    
    const newSkins = evaluateSkinUnlocks();
    if (newSkins.length > 0) {
      showSkinUnlockPopup(newSkins, data);
    } else {
      finalizeDeathScreenUI(data);
    }
  }

  function finalizeDeathScreenUI(data) {
    const dScore = document.getElementById('deathScore');
    const dHigh = document.getElementById('deathHighscore');
    if (dScore) dScore.textContent = data.finalScore || 0;
    if (dHigh) dHigh.textContent = localStats.highScore;
    
    deathScreen.classList.remove('hidden');
    if (data.killerName) {
      deathKiller.textContent = `Eliminated by ${data.killerName}`;
    } else {
      const msgs = ['You crashed!', 'Total wipeout!', 'Too drunk to drive!', 'RIP your car!'];
      deathKiller.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    }
    
    // Only start timer if we are still connected to the game
    // If the player left during a popup, respawnTime won't matter, they just click X
    let t = Math.ceil(data.respawnTime || 3);
    deathTimer.textContent = t;
    if (deathTimerInterval) clearInterval(deathTimerInterval);
    deathTimerInterval = setInterval(() => {
      t--;
      if (t > 0) {
        deathTimer.textContent = t;
      } else {
        deathTimer.textContent = '0';
        clearInterval(deathTimerInterval);
        deathTimerInterval = null;
        if (socket && connected) socket.emit('request_respawn');
      }
    }, 1000);
  }

  function hideDeathScreenUI() {
    deathScreen.classList.add('hidden');
    if (deathTimerInterval) clearInterval(deathTimerInterval);
  }

  // ─── CAR CUSTOMIZATION ─────────────────────────────────────
  function initCustomizer() {
    // Color swatches
    let html = '';
    for (const c of CAR_COLORS) {
      html += `<div class="color-swatch ${c === customColor ? 'selected' : ''}" data-color="${c}" style="background: ${c}; color: ${c};"></div>`;
    }
    colorSwatches.innerHTML = html;

    colorSwatches.onclick = (e) => {
      const swatch = e.target.closest('.color-swatch');
      if (!swatch) return;
      customColor = swatch.dataset.color;
      colorSwatches.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      swatch.classList.add('selected');
      renderCarPreview();
    };

    // Style buttons
    document.querySelectorAll('.car-style-btn').forEach(btn => {
      btn.onclick = () => {
        customStyle = btn.dataset.style;
        document.querySelectorAll('.car-style-btn').forEach(b => {
          b.classList.remove('selected');
          b.style.borderColor = '';
          b.style.color = '';
        });
        btn.classList.add('selected');
        btn.style.borderColor = 'rgba(0,240,255,0.5)';
        btn.style.color = '#00f0ff';
        renderCarPreview();
      };
    });

    // Skins Carousel
    const btnPrev = document.getElementById('carouselPrev');
    const btnNext = document.getElementById('carouselNext');
    const equipBtn = document.getElementById('equipSkinBtn');
    
    if (btnPrev && btnNext) {
      // Find current skin index
      const keys = Object.keys(CAR_SKINS);
      let carouselIndex = keys.indexOf(customSkin);
      if (carouselIndex === -1) carouselIndex = 0;

      const updateCarousel = () => {
        const key = keys[carouselIndex];
        const skin = CAR_SKINS[key];
        const isUnlocked = unlockedSkins.includes(key);
        
        // Update Title
        document.getElementById('carouselSkinName').textContent = skin.label;
        
        // Update Locked Overlay
        const overlay = document.getElementById('skinLockedOverlay');
        const overlayText = document.getElementById('skinLockedText');
        if (!isUnlocked) {
          overlay.classList.remove('hidden');
          overlayText.textContent = skin.desc;
        } else {
          overlay.classList.add('hidden');
        }

        // Update Equip Button
        if (isUnlocked) {
          equipBtn.classList.remove('hidden');
          if (customSkin === key) {
            equipBtn.textContent = 'EQUIPPED';
            equipBtn.classList.add('bg-neon-cyan', 'text-black');
          } else {
            equipBtn.textContent = 'EQUIP';
            equipBtn.classList.remove('bg-neon-cyan', 'text-black');
          }
        } else {
          equipBtn.classList.add('hidden');
        }
        
        // Render Preview
        currentPreviewSkin = key;
        renderCarPreview();
      };

      btnPrev.onclick = () => {
        carouselIndex = (carouselIndex - 1 + keys.length) % keys.length;
        updateCarousel();
      };

      btnNext.onclick = () => {
        carouselIndex = (carouselIndex + 1) % keys.length;
        updateCarousel();
      };
      
      if(equipBtn) {
        equipBtn.onclick = () => {
           const key = keys[carouselIndex];
           if (unlockedSkins.includes(key)) {
             customSkin = key;
             updateCarousel();
           }
        };
      }

      // Initial render
      updateCarousel();
      
      // Secret Code Logic
      const codeInput = document.getElementById('skinCodeInput');
      const submitBtn = document.getElementById('submitCodeBtn');
      const resultMsg = document.getElementById('codeResultMsg');

      if (codeInput && submitBtn) {
        const checkCode = () => {
          const code = codeInput.value.trim().toUpperCase();
          if (!code) return;
          
          let unlockedKey = null;
          if (code === 'DRUNKDRIVERS') {
            unlockedKey = 'community';
          } else if (code === 'PH1L1PP3-M4ST3R') {
            unlockedKey = 'owner';
          }

          if (unlockedKey) {
            if (!unlockedSkins.includes(unlockedKey)) {
              unlockedSkins.push(unlockedKey);
              saveStats();
              resultMsg.textContent = `${CAR_SKINS[unlockedKey].label} Unlocked!`;
              resultMsg.className = 'font-body text-[10px] mt-1 text-neon-green text-center';
              codeInput.value = '';
              carouselIndex = keys.indexOf(unlockedKey);
              updateCarousel();
            } else {
              resultMsg.textContent = 'Already Unlocked!';
              resultMsg.className = 'font-body text-[10px] mt-1 text-gray-400 text-center';
            }
          } else {
            resultMsg.textContent = 'Invalid Code!';
            resultMsg.className = 'font-body text-[10px] mt-1 text-neon-red text-center';
          }
          resultMsg.classList.remove('hidden');
          setTimeout(() => resultMsg.classList.add('hidden'), 3000);
        };

        submitBtn.onclick = checkCode;
        codeInput.onkeydown = (e) => { if (e.key === 'Enter') checkCode(); };
      }
    }

    // Glow slider
    glowSlider.oninput = () => {
      customGlow = parseInt(glowSlider.value);
      renderCarPreview();
    };

    // Panel toggle
    customizeBtn.onclick = () => {
      menuCard.classList.add('hidden');
      customizePanel.classList.remove('hidden');
      renderCarPreview();
    };
    customizeBack.onclick = () => {
      customizePanel.classList.add('hidden');
      menuCard.classList.remove('hidden');
    };

    // Set initial style button
    document.querySelector('.car-style-btn.selected').style.borderColor = 'rgba(0,240,255,0.5)';
    document.querySelector('.car-style-btn.selected').style.color = '#00f0ff';

    renderCarPreview();
  }

  function renderCarPreview() {
    const c = carPreviewCtx;
    const cw = carPreviewCanvas.width;
    const ch = carPreviewCanvas.height;
    c.clearRect(0, 0, cw, ch);
    c.fillStyle = 'rgba(6, 6, 16, 0.9)';
    c.fillRect(0, 0, cw, ch);
    // Grid lines
    c.strokeStyle = 'rgba(255,255,255,0.03)';
    c.lineWidth = 1;
    for (let x = 0; x < cw; x += 20) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, ch); c.stroke(); }
    for (let y = 0; y < ch; y += 20) { c.beginPath(); c.moveTo(0, y); c.lineTo(cw, y); c.stroke(); }

    const dims = getCarDims(customStyle);
    c.save();
    c.translate(cw / 2, ch / 2);
    drawVehicleShape(c, dims.w * 2, dims.h * 2, customColor, currentPreviewSkin, customGlow, false);
    c.restore();
  }

  // ─── NETWORKING ─────────────────────────────────────────────
  function connectSocket() {
    socket = io('https://drunkdrivers-eu.onrender.com');

    socket.on('connect', () => {
      connected = true;
      console.log('[Socket] Connected:', socket.id);
    });

    let currentRoomId = null;

    socket.on('disconnect', () => {
      connected = false;
      playing = false;
      currentRoomId = null;
      if (window.CrazyGames) {
        try { 
          window.CrazyGames.SDK.game.gameplayStop(); 
          window.CrazyGames.SDK.game.hideInviteButton();
        } catch (e) {}
      }
      menuOverlay.classList.remove('hidden');
      menuCard.classList.remove('hidden');
      customizePanel.classList.add('hidden');
      gameHUD.classList.add('hidden');
    });

    socket.on('welcome', (data) => {
      localId = data.id;
      currentRoomId = data.roomId;
      const hudRoomCode = document.getElementById('hudRoomCode');
      if (hudRoomCode) hudRoomCode.textContent = data.roomId || '----';
      worldData = data.world;
      pillars = data.pillars;
      pits = data.pits;
      borderMargin = data.borderMargin;
      tickRate = data.tickRate;
      serverItems = data.items || [];
      playing = true;
      menuOverlay.classList.add('hidden');
      gameHUD.classList.remove('hidden');
      hideDeathScreenUI();
      
      if (window.CrazyGames) {
        try {
          window.CrazyGames.SDK.game.gameplayStart();
          window.CrazyGames.SDK.game.updateRoom({
            roomId: data.roomId,
            isJoinable: true,
            inviteParams: { roomId: data.roomId }
          });
          window.CrazyGames.SDK.game.showInviteButton({ inviteParams: { roomId: data.roomId } });
        } catch (e) { console.error(e); }
      }
      
      console.log('[Game] Joined as', localId, 'in room', data.roomId);
    });

    socket.on('itemSpawn', (item) => {
      serverItems.push(item);
    });

    socket.on('itemPickup', (itemId) => {
      serverItems = serverItems.filter(i => i.id !== itemId);
    });

    socket.on('joinError', (data) => {
      alert(data.message || 'Error joining room.');
    });

    socket.on('state', (data) => {
      serverPlayers = data.players;
      if (data.collisions) {
        for (const c of data.collisions) spawnCollisionSparks(c.x, c.y);
      }
      for (const sp of serverPlayers) {
        if (!renderPlayers[sp.id]) {
          renderPlayers[sp.id] = { rx: sp.x, ry: sp.y, rAngle: sp.angle, ...sp };
        } else {
          Object.assign(renderPlayers[sp.id], sp);
        }
      }
      const activeIds = new Set(serverPlayers.map(p => p.id));
      for (const id of Object.keys(renderPlayers)) {
        if (!activeIds.has(id)) delete renderPlayers[id];
      }
    });

    socket.on('leaderboard', (data) => {
      leaderboard = data;
      const myEntry = data.find(e => e.id === localId);
      if (myEntry) {
        let statsChanged = false;
        if (myEntry.score > localStats.highScore) {
          localStats.highScore = myEntry.score;
          statsChanged = true;
        }
        if (myEntry.time > localStats.longestSurvival) {
          localStats.longestSurvival = myEntry.time;
          statsChanged = true;
        }
        if (statsChanged) saveStats();
      }
      updateLeaderboardUI(data);
    });

    socket.on('killed', (data) => showDeathScreenUI(data));
    socket.on('respawned', () => hideDeathScreenUI());

    socket.on('pickup', (data) => {
      localStats.totalDrinks++;
      saveStats();
      
      const local = getLocalPlayer();
      if (local) {
        spawnPickupBurst(local.rx, local.ry, data.type === 'drink' ? '#ff00e5' : '#00ff88');
      }
    });

    socket.on('kill_confirmed', () => {
      localStats.totalKills++;
      saveStats();
    });
  }

  // ─── INPUT ──────────────────────────────────────────────────
  function setupInput() {
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });
    window.addEventListener('blur', () => {
      for (const k in keys) keys[k] = false;
    });
  }

  // ─── MOBILE TOUCH CONTROLS ─────────────────────────────────
  // ─── MOBILE TOUCH CONTROLS ─────────────────────────────────
  let joystick = null;

  function setupTouchControls() {
    if (isMobile && typeof nipplejs !== 'undefined') {
      joystick = nipplejs.create({
        zone: document.getElementById('joystickZone'),
        mode: 'dynamic',
        color: '#00f0ff',
        size: 100
      });

      joystick.on('move', (evt, data) => {
        touchKeys.moving = data.force > 0.15;
        touchKeys.targetAngle = -data.angle.radian;
      });
      joystick.on('end', () => {
        touchKeys.moving = false;
      });
    }

    const boostBtn = document.getElementById('touchBoost');
    if (boostBtn) {
      const press = (e) => { e.preventDefault(); touchKeys.boost = true; boostBtn.classList.add('pressed'); };
      const release = (e) => { e.preventDefault(); touchKeys.boost = false; boostBtn.classList.remove('pressed'); };
      boostBtn.addEventListener('touchstart', press, { passive: false });
      boostBtn.addEventListener('touchend', release, { passive: false });
      boostBtn.addEventListener('touchcancel', release);
    }
  }

  function sendInput() {
    if (!socket || !playing) return;
    const now = performance.now();
    if (now - lastInputSend < (1000 / tickRate) * 0.8) return;
    lastInputSend = now;

    let targetAngle = null;
    let moving = false;

    if (isMobile && touchKeys.moving) {
      moving = true;
      targetAngle = touchKeys.targetAngle;
    } else {
      let dx = 0; let dy = 0;
      if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
      if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
      if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
      if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
      if (dx !== 0 || dy !== 0) {
        moving = true;
        targetAngle = Math.atan2(dy, dx);
      }
    }

    socket.emit('input', {
      targetAngle: targetAngle,
      moving: moving,
      boost: !!(keys['Space'] || touchKeys.boost)
    });
  }

  // ─── MENU ───────────────────────────────────────────────────
  function setupMenu() {
    const roomCodeInput = document.getElementById('roomCodeInput');
    const join = () => {
      if (!connected) return;
      const name = nicknameInput.value.trim() || 'Driver';
      const roomCode = roomCodeInput ? roomCodeInput.value.trim().toUpperCase() : '';
      console.log('Sending join with:', name, roomCode);
      socket.emit('join', { name, color: customColor, style: customStyle, skin: customSkin, glow: customGlow, roomCode });
    };
    playBtn.addEventListener('click', join);
    nicknameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') join();
    });
    nicknameInput.focus();

    const deathCloseBtn = document.getElementById('deathCloseBtn');
    if (deathCloseBtn) {
      deathCloseBtn.addEventListener('click', () => {
        socket.emit('leave');
        if (deathTimerInterval) {
          clearInterval(deathTimerInterval);
          deathTimerInterval = null;
        }
        deathScreen.classList.add('hidden');
        menuOverlay.classList.remove('hidden');
        menuCard.classList.remove('hidden');
        playing = false;
        currentRoomId = null;
        if (window.CrazyGames) {
          try { 
            window.CrazyGames.SDK.game.gameplayStop(); 
            window.CrazyGames.SDK.game.hideInviteButton();
          } catch(e){}
        }
        gameHUD.classList.add('hidden');
      });
    }
  }

  // ─── MAIN RENDER LOOP ──────────────────────────────────────
  let lastFrame = 0;

  function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);
    const dt = Math.min((timestamp - lastFrame) / 1000, 0.05);
    lastFrame = timestamp;
    if (!playing) return;

    sendInput();

    // Smooth interpolation
    for (const id of Object.keys(renderPlayers)) {
      const rp = renderPlayers[id];
      const factor = id === localId ? LERP_LOCAL : LERP_REMOTE;
      rp.rx = lerp(rp.rx, rp.x, factor);
      rp.ry = lerp(rp.ry, rp.y, factor);
      rp.rAngle = lerpAngle(rp.rAngle, rp.angle, factor);
      if (rp.alive) spawnExhaust(rp);
    }

    updateCamera(dt);
    updateParticles(dt);

    // ── RENDER ──
    ctx.fillStyle = '#060610';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    drawPits();
    drawPillars();
    drawBorder();
    drawItems();
    drawParticles();

    const localServer = getLocalServerPlayer();
    const hasDoubleVision = localServer && localServer.effects && localServer.effects.some(e => e.type === 'DOUBLE_VISION');
    const hasTunnelVision = localServer && localServer.effects && localServer.effects.some(e => e.type === 'TUNNEL_VISION');

    if (hasDoubleVision) drawDoubleVision();

    for (const id of Object.keys(renderPlayers)) {
      drawVehicle(renderPlayers[id], id === localId);
    }

    drawKingPointer();

    if (hasTunnelVision) drawTunnelVision();

    // UI
    updatePromilleUI();
    updateHPUI();
    updateBoostUI();
    updateScoreUI();
    updateEffectBadgesUI();
  }

  // ─── INITIALIZATION ─────────────────────────────────────────
  async function init() {
    try {
      if (window.CrazyGames) {
        await window.CrazyGames.SDK.init();
      }
    } catch (e) { console.error('CrazyGames SDK init failed', e); }

    setupMenu();
    connectSocket();
    setupInput();
    setupTouchControls();
    initCustomizer();

    if (window.CrazyGames && window.CrazyGames.SDK.game.inviteParams) {
      const roomCodeInput = document.getElementById('roomCodeInput');
      if (roomCodeInput && window.CrazyGames.SDK.game.inviteParams.roomId) {
        roomCodeInput.value = window.CrazyGames.SDK.game.inviteParams.roomId;
      }
    }

    requestAnimationFrame(gameLoop);
    console.log('Drunk Drivers.io — Client initialized');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
